  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ---------- UTILS ----------
    function formatTime(time24, use24Hour) {
      if (!time24) return "";
      if (use24Hour) return time24;
      const [h, m] = time24.split(":").map(Number);
      const period = h >= 12 ? "PM" : "AM";
      const h12 = h % 12 || 12;
      return `${h12}:${m.toString().padStart(2, "0")} ${period}`;
    }
    function formatRange(start, end, use24Hour) {
      if (!start || !end) return "";
      return `${formatTime(start, use24Hour)} – ${formatTime(end, use24Hour)}`;
    }
    function formatDateOnly(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function timeToMin(t) {
      if (!t) return 0;
      const [h, m] = t.split(":").map(Number);
      return h * 60 + m;
    }
    function getCurrentMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }
    function getTodayDate() {
      return new Date().toISOString().slice(0,10);
    }

    // ---------- PERSIAN CALENDAR (Jalali) ----------
    const persianMonths = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
    const afghaniMonths = ['حمل', 'ثور', 'جوزا', 'سرطان', 'اسد', 'سنبله', 'میزان', 'عقرب', 'قوس', 'جدی', 'دلو', 'حوت'];
    const persianWeekdays = ['یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنج‌شنبه', 'جمعه', 'شنبه'];

    function gregorianToJalali(gy, gm, gd) {
      const g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
      let jy = (gy <= 1600) ? 0 : 979;
      gy -= (gy <= 1600) ? 621 : 1600;
      const gy2 = (gm > 2) ? (gy + 1) : gy;
      let days = (365 * gy) + (Math.floor((gy2 + 3) / 4)) - (Math.floor((gy2 + 99) / 100)) + (Math.floor((gy2 + 399) / 400)) - 80 + gd + g_d_m[gm - 1];
      const jy2 = jy + 33 * Math.floor(days / 12053);
      days %= 12053;
      let jy3 = jy2 + 4 * Math.floor(days / 1461);
      days %= 1461;
      jy3 = jy3 + Math.floor((days - 1) / 365);
      if (days > 365) days = (days - 1) % 365;
      const jm = (days < 186) ? 1 + Math.floor(days / 31) : 7 + Math.floor((days - 186) / 30);
      const jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));
      return { year: jy3, month: jm, day: jd };
    }

    // ---------- LOADING QUOTES ----------

    ];

    // ---------- PARTICLE BACKGROUND ----------
    let particleAnimationId = null;
    let particleCtx = null;
    let particleCanvas = null;
    let particlesArray = [];
    let particleWidth = 0, particleHeight = 0;

    function initParticleCanvas() {
      const canvas = document.getElementById('particle-canvas');
      if (!canvas) return;
      particleCanvas = canvas;
      particleCtx = canvas.getContext('2d');
      
      function resizeCanvas() {
        particleWidth = window.innerWidth;
        particleHeight = window.innerHeight;
        canvas.width = particleWidth;
        canvas.height = particleHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      
      const PARTICLE_COUNT = 40;
      particlesArray = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particlesArray.push({
          x: Math.random() * particleWidth,
          y: Math.random() * particleHeight,
          radius: Math.random() * 5 + 2,
          speedX: (Math.random() - 0.5) * 0.25,
          speedY: (Math.random() - 0.5) * 0.25,
          color: `rgba(0, 234, 255, ${Math.random() * 0.5 + 0.3})`
        });
      }
      
      function draw() {
        if (!particleCtx) return;
        particleCtx.clearRect(0, 0, particleWidth, particleHeight);
        for (let i = 0; i < particlesArray.length; i++) {
          for (let j = i + 1; j < particlesArray.length; j++) {
            const dx = particlesArray[i].x - particlesArray[j].x;
            const dy = particlesArray[i].y - particlesArray[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 180) {
              particleCtx.strokeStyle = `rgba(0, 234, 255, ${0.5 * (1 - dist/180)})`;
              particleCtx.lineWidth = 1.5;
              particleCtx.beginPath();
              particleCtx.moveTo(particlesArray[i].x, particlesArray[i].y);
              particleCtx.lineTo(particlesArray[j].x, particlesArray[j].y);
              particleCtx.stroke();
            }
          }
        }
        for (let p of particlesArray) {
          particleCtx.beginPath();
          particleCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          particleCtx.fillStyle = p.color;
          particleCtx.fill();
          p.x += p.speedX;
          p.y += p.speedY;
          if (p.x < 0) p.x = particleWidth;
          if (p.x > particleWidth) p.x = 0;
          if (p.y < 0) p.y = particleHeight;
          if (p.y > particleHeight) p.y = 0;
        }
        particleAnimationId = requestAnimationFrame(draw);
      }
      draw();
    }
    
    function destroyParticleCanvas() {
      if (particleAnimationId) {
        cancelAnimationFrame(particleAnimationId);
        particleAnimationId = null;
      }
      const canvas = document.getElementById('particle-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      particlesArray = [];
    }

    // ---------- HOOKS ----------
    function useTheme() {
      const [isDark, setIsDark] = useState(() => localStorage.getItem("theme") === "dark");
      useEffect(() => {
        const root = document.documentElement;
        if (isDark) root.classList.add("dark");
        else root.classList.remove("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      }, [isDark]);
      return { isDark, toggle: () => setIsDark(v => !v) };
    }

    function useFirestoreTasks(user, autoResetToday) {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [undoStack, setUndoStack] = useState([]);

      // Daily reset for "today" column
      useEffect(() => {
        if (!user || !autoResetToday) return;
        const performReset = async () => {
          const lastReset = localStorage.getItem(`lastReset_${user.uid}`);
          const today = getTodayDate();
          if (lastReset !== today) {
            const todayTasksRef = db.collection('users').doc(user.uid).collection('tasks');
            const snapshot = await todayTasksRef.where('column', '==', 'today').where('completed', '==', true).get();
            const batch = db.batch();
            snapshot.forEach(doc => batch.update(doc.ref, { completed: false }));
            await batch.commit();
            localStorage.setItem(`lastReset_${user.uid}`, today);
            const newSnapshot = await todayTasksRef.get();
            const updatedTasks = [];
            newSnapshot.forEach(doc => updatedTasks.push({ id: doc.id, ...doc.data() }));
            setTasks(prev => {
              const otherTasks = prev.filter(t => t.column !== 'today');
              return [...otherTasks, ...updatedTasks];
            });
          }
        };
        performReset();
      }, [user, autoResetToday]);

      useEffect(() => {
        if (!user) { setTasks([]); setLoading(false); return; }
        setLoading(true);
        const ref = db.collection('users').doc(user.uid).collection('tasks');
        const unsubscribe = ref.onSnapshot(snapshot => {
          const loaded = [];
          snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
          setTasks(loaded);
          setLoading(false);
        });
        return () => unsubscribe();
      }, [user]);

      const addTask = useCallback(async (data) => {
        if (!user) return;
        const newTask = { ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), completed: false };
        await db.collection('users').doc(user.uid).collection('tasks').add(newTask);
      }, [user]);

      const updateTask = useCallback(async (id, updates) => {
        if (!user) return;
        await db.collection('users').doc(user.uid).collection('tasks').doc(id).update(updates);
      }, [user]);

      const deleteTask = useCallback(async (id) => {
        if (!user) return;
        const taskToDelete = tasks.find(t => t.id === id);
        if (!taskToDelete) return;
        await db.collection('users').doc(user.uid).collection('tasks').doc(id).delete();
        
        let remaining = 5;
        const intervalId = setInterval(() => {
          remaining--;
          if (remaining <= 0) {
            clearInterval(intervalId);
            setUndoStack(prev => prev.filter(item => item.task.id !== id));
          } else {
            setUndoStack(prev => prev.map(item => item.task.id === id ? { ...item, remaining } : item));
          }
        }, 1000);
        setUndoStack(prev => [...prev, { task: taskToDelete, remaining, intervalId }]);
      }, [user, tasks]);

      const undoDelete = useCallback(async (task) => {
        const item = undoStack.find(i => i.task.id === task.id);
        if (item) clearInterval(item.intervalId);
        setUndoStack(prev => prev.filter(i => i.task.id !== task.id));
        const { id, ...taskData } = task;
        await db.collection('users').doc(user.uid).collection('tasks').doc(id).set(taskData);
      }, [user, undoStack]);

      const toggleCompleted = useCallback(async (id, current) => {
        await updateTask(id, { completed: !current });
      }, [updateTask]);

      return { tasks, loading, addTask, updateTask, deleteTask, toggleCompleted, undoStack, undoDelete };
    }

    // ---------- COMPONENTS ----------
    function SmallCircleClock({ tasksToday, is24Hour }) {
      const [currentTime, setCurrentTime] = useState(new Date());
      useEffect(() => {
        const interval = setInterval(() => setCurrentTime(new Date()), 100);
        return () => clearInterval(interval);
      }, []);
      const hours = currentTime.getHours();
      const minutes = currentTime.getMinutes();
      const seconds = currentTime.getSeconds();
      const hourDeg = ((hours % 12) / 12) * 360 + (minutes / 60) * 30;
      const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
      const secondDeg = (seconds / 60) * 360;
      
      const size = 150;
      const center = size/2;
      const radius = size * 0.42;
      
      const taskArcs = tasksToday.filter(t => t.startTime && t.endTime && !t.completed).map(task => {
        const startMin = timeToMin(task.startTime);
        const endMin = timeToMin(task.endTime);
        let startDeg = (startMin / (24 * 60)) * 360;
        let endDeg = (endMin / (24 * 60)) * 360;
        if (endDeg < startDeg) endDeg += 360;
        return { startDeg, endDeg, color: '#3b82f6' };
      });
      
      return (
        <div className="small-clock-container relative clock-shadow">
          <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full">
            <circle cx={center} cy={center} r={radius+5} fill="none" stroke={`hsl(var(--border))`} strokeWidth="1.5" opacity="0.3" />
            {[...Array(12)].map((_, i) => {
              const angle = (i * 30 - 90) * Math.PI / 180;
              const x1 = center + (radius-8) * Math.cos(angle);
              const y1 = center + (radius-8) * Math.sin(angle);
              const x2 = center + (radius+2) * Math.cos(angle);
              const y2 = center + (radius+2) * Math.sin(angle);
              return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={`hsl(var(--foreground))`} strokeWidth="1.5" opacity="0.6" />;
            })}
            {taskArcs.map((arc, idx) => {
              const startRad = (arc.startDeg - 90) * Math.PI / 180;
              const endRad = (arc.endDeg - 90) * Math.PI / 180;
              const rArc = radius - 8;
              const x1 = center + rArc * Math.cos(startRad);
              const y1 = center + rArc * Math.sin(startRad);
              const x2 = center + rArc * Math.cos(endRad);
              const y2 = center + rArc * Math.sin(endRad);
              const large = arc.endDeg - arc.startDeg > 180 ? 1 : 0;
              return <path key={idx} d={`M ${x1} ${y1} A ${rArc} ${rArc} 0 ${large} 1 ${x2} ${y2}`} stroke={arc.color} strokeWidth="3" fill="none" opacity="0.4" />;
            })}
            <line x1={center} y1={center} x2={center + (radius-28) * Math.cos((hourDeg - 90) * Math.PI/180)} y2={center + (radius-28) * Math.sin((hourDeg - 90) * Math.PI/180)} stroke={`hsl(var(--foreground))`} strokeWidth="2.5" strokeLinecap="round" />
            <line x1={center} y1={center} x2={center + (radius-15) * Math.cos((minuteDeg - 90) * Math.PI/180)} y2={center + (radius-15) * Math.sin((minuteDeg - 90) * Math.PI/180)} stroke={`hsl(var(--primary))`} strokeWidth="1.8" strokeLinecap="round" />
            <line x1={center} y1={center} x2={center + (radius-6) * Math.cos((secondDeg - 90) * Math.PI/180)} y2={center + (radius-6) * Math.sin((secondDeg - 90) * Math.PI/180)} stroke="#ef4444" strokeWidth="1" strokeLinecap="round" />
            <circle cx={center} cy={center} r="3.5" fill={`hsl(var(--foreground))`} />
            <circle cx={center} cy={center} r="1.5" fill="#ef4444" />
          </svg>
        </div>
      );
    }

    // UPDATED: LargeNumericalClock now includes Persian date below the Gregorian date
    function LargeNumericalClock({ is24Hour }) {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [persianDate, setPersianDate] = useState({ year: 0, month: 0, day: 0, weekday: 0 });
      
      useEffect(() => {
        const interval = setInterval(() => {
          const now = new Date();
          setCurrentTime(now);
          const year = now.getFullYear();
          const month = now.getMonth() + 1;
          const day = now.getDate();
          const weekday = now.getDay();
          const jalali = gregorianToJalali(year, month, day);
          setPersianDate({ year: jalali.year, month: jalali.month, day: jalali.day, weekday });
        }, 100);
        return () => clearInterval(interval);
      }, []);
      
      let hours = currentTime.getHours();
      const minutes = currentTime.getMinutes().toString().padStart(2, '0');
      const hoursStr = hours.toString().padStart(2, '0');
      const dateStr = currentTime.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      let ampm = '';
      if (!is24Hour) {
        ampm = hours >= 12 ? 'PM' : 'AM';
      }
      const displayTime = is24Hour ? `${hoursStr}:${minutes}` : `${(hours % 12 || 12).toString().padStart(2, '0')}:${minutes}`;
      
      // Format Persian date: "weekday، day month_name (alt_month_name) year"
      let persianDateStr = '';
      if (persianDate.year !== 0) {
        const weekdayName = persianWeekdays[persianDate.weekday];
        const afghaniName = afghaniMonths[persianDate.month - 1];
        const iranianName = persianMonths[persianDate.month - 1];
        persianDateStr = `${weekdayName}، ${persianDate.day} ${afghaniName} (${iranianName}) ${persianDate.year}`;
      }
      
      return (
        <div>
          <div className="large-numerical-clock">{displayTime}</div>
          <div className="flex flex-col mt-1 text-xs text-muted-foreground">
            <div className="flex justify-between items-center">
              <span>{dateStr}</span>
              {!is24Hour && <span className="ml-2">{ampm}</span>}
            </div>
            {persianDateStr && (
              <div className="persian-font text-right mt-0.5 text-[0.7rem] opacity-80">
                {persianDateStr}
              </div>
            )}
          </div>
        </div>
      );
    }

    function NextUpAndMissed({ tasksToday, is24Hour }) {
      const [now, setNow] = useState(getCurrentMinutes());
      const [animatingIds, setAnimatingIds] = useState([]);

      useEffect(() => {
        const interval = setInterval(() => {
          setNow(getCurrentMinutes());
        }, 10000);
        return () => clearInterval(interval);
      }, []);

      const nextTask = tasksToday.filter(t => !t.completed && t.startTime && timeToMin(t.startTime) > now).sort((a,b) => timeToMin(a.startTime) - timeToMin(b.startTime))[0];
      const missedTasks = tasksToday.filter(t => !t.completed && t.endTime && timeToMin(t.endTime) <= now && timeToMin(t.endTime) > 0);
      
      useEffect(() => {
        const newCompleted = tasksToday.filter(t => t.completed && t.endTime && timeToMin(t.endTime) <= now && timeToMin(t.endTime) > 0);
        const justCompleted = newCompleted.filter(t => !animatingIds.includes(t.id));
        if (justCompleted.length) {
          setAnimatingIds(prev => [...prev, ...justCompleted.map(t => t.id)]);
          setTimeout(() => {
            setAnimatingIds(prev => prev.filter(id => !justCompleted.some(t => t.id === id)));
          }, 250);
        }
      }, [tasksToday, now]);
      
      const visibleMissed = missedTasks.filter(t => !animatingIds.includes(t.id));
      return (
        <div className="space-y-4">
          <div className="task-card-today p-4">
            <div className="flex items-center gap-2 mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={`hsl(var(--primary))`}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><h3 className="text-xs font-semibold uppercase tracking-wide">Next Up</h3></div>
            {nextTask ? <div><p className="text-sm font-medium">{nextTask.title}</p><span className="inline-block mt-1 text-[11px] font-medium px-2 py-0.5 rounded-md" style={{background:`hsl(var(--primary)/0.1)`, color:`hsl(var(--primary))`}}>{formatRange(nextTask.startTime, nextTask.endTime, is24Hour)}</span></div> : <p className="text-xs opacity-60">All done! 🎉</p>}
          </div>
          {visibleMissed.length > 0 && (
            <div className="task-card-missed p-4">
              <div className="flex items-center gap-2 mb-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={`hsl(var(--destructive))`}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><h3 className="text-xs font-semibold uppercase tracking-wide">Missed ({missedTasks.length})</h3></div>
              <div className="space-y-2 max-h-64 overflow-y-auto">
                {visibleMissed.map(task => (
                  <div key={task.id} className="rounded-lg p-2" style={{background:`hsl(var(--destructive)/0.05)`, border:`1px solid hsl(var(--destructive)/0.1)`}}>
                    <p className="text-xs font-medium">{task.title}</p>
                    <span className="inline-block mt-1 text-[10px] font-medium px-1.5 py-0.5 rounded-md" style={{background:`hsl(var(--destructive)/0.1)`, color:`hsl(var(--destructive)/0.8)`}}>{formatRange(task.startTime, task.endTime, is24Hour)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function TaskCard({ task, onToggle, onDelete, onUpdate, is24Hour, isIdea = false, isSoon = false, columnType }) {
      const [editing, setEditing] = useState(false);
      const [editTitle, setEditTitle] = useState(task.title);
      const [editDesc, setEditDesc] = useState(task.description || "");
      const [editStart, setEditStart] = useState(task.startTime || "");
      const [editEnd, setEditEnd] = useState(task.endTime || "");
      const [editDueDate, setEditDueDate] = useState(task.dueDate || "");
      const textareaRef = useRef(null);
      
      const cardClass = columnType === 'today' ? 'task-card-today' : (columnType === 'soon' ? 'task-card-soon' : 'task-card-ideas');
      const dateBadgeClass = columnType === 'today' ? 'date-badge-today' : (columnType === 'soon' ? 'date-badge-soon' : 'date-badge-ideas');
      
      const save = () => {
        const updates = { title: editTitle, description: editDesc };
        if (!isIdea && !isSoon) { 
          updates.startTime = editStart || null; 
          updates.endTime = editEnd || null; 
        }
        if (isSoon) { updates.dueDate = editDueDate || null; }
        onUpdate(updates);
        setEditing(false);
      };
      const handleKeyDown = (e, field) => {
        if (field === 'title' && e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
      };
      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
        }
      }, [editDesc]);
      
      if (editing) {
        return (
          <div className={`${cardClass} p-3 animate-scale-in space-y-2`}>
            <input className="w-full rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-1" style={{background:`hsl(var(--secondary))`}} value={editTitle} onChange={e=>setEditTitle(e.target.value)} onKeyDown={(e)=>handleKeyDown(e,'title')} placeholder={isIdea ? "Idea title" : "Task title"} autoFocus />
            <textarea ref={textareaRef} className="w-full rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-1 auto-expand-textarea" rows="1" style={{background:`hsl(var(--secondary))`}} value={editDesc} onChange={e=>setEditDesc(e.target.value)} onKeyDown={e=>{if(e.key==='Enter' && e.shiftKey){}else if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); save();}}} placeholder="Description" />
            {!isIdea && !isSoon && (
              <div className="flex gap-2 items-center">
                <input type="time" value={editStart} onChange={e=>setEditStart(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
                <span className="text-xs">to</span>
                <input type="time" value={editEnd} onChange={e=>setEditEnd(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
              </div>
            )}
            {isSoon && (
              <div className="flex gap-2 items-center">
                <input type="date" value={editDueDate} onChange={e=>setEditDueDate(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
              </div>
            )}
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setEditing(false)} className="px-3 py-1 rounded-lg text-xs" style={{color:`hsl(var(--muted-foreground))`}}>Cancel</button>
              <button onClick={save} className="px-3 py-1 rounded-lg text-xs" style={{background:`hsl(var(--primary))`, color:`hsl(var(--primary-foreground))`}}>Save</button>
            </div>
          </div>
        );
      }
      return (
        <div className={`${cardClass} p-3 animate-fade-in transition-all`} style={{opacity: task.completed ? 0.5 : 1}}>
          <div className="flex items-start gap-2">
            <button onClick={onToggle} className="mt-0.5 flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all" style={{borderColor: task.completed ? `hsl(var(--accent))` : `hsl(var(--muted-foreground)/0.4)`, background: task.completed ? `hsl(var(--accent))` : 'transparent'}}>
              {task.completed && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={`hsl(var(--accent-foreground))`} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
            </button>
            <div className="flex-1 min-w-0">
              <p className={`text-sm font-medium leading-tight ${task.completed ? 'line-through opacity-60' : ''}`}>{task.title}</p>
              {task.description && <p className="text-xs opacity-60 mt-0.5 whitespace-pre-wrap">{task.description}</p>}
              {!isIdea && !isSoon && task.startTime && task.endTime && (
                <span className="inline-block mt-1 text-[11px] font-medium rounded-md px-2 py-0.5" style={{background:`hsl(var(--primary)/0.1)`, color:`hsl(var(--primary))`}}>{formatRange(task.startTime, task.endTime, is24Hour)}</span>
              )}
              {isSoon && task.dueDate && (
                <span className={`inline-block mt-1 text-[11px] font-medium rounded-md px-2 py-0.5 ${dateBadgeClass}`}>{formatDateOnly(task.dueDate)}</span>
              )}
            </div>
            <div className="flex items-center gap-0.5">
              <button onClick={()=>setEditing(true)} className="p-1 rounded-md hover:bg-black/5 dark:hover:bg-white/5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              <button onClick={onDelete} className="p-1 rounded-md hover:bg-black/5 dark:hover:bg-white/5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
            </div>
          </div>
        </div>
      );
    }

    function AddTaskForm({ column, onAdd, isIdea = false, isSoon = false }) {
      const [open, setOpen] = useState(false);
      const [title, setTitle] = useState("");
      const [desc, setDesc] = useState("");
      const [startTime, setStartTime] = useState("");
      const [endTime, setEndTime] = useState("");
      const [dueDate, setDueDate] = useState("");
      const textareaRef = useRef(null);
      
      useEffect(() => {
        if (textareaRef.current && open) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
        }
      }, [desc, open]);
      
      const submit = () => {
        if (!title.trim()) return;
        const base = { title: title.trim(), description: desc.trim(), column, completed: false };
        if (!isIdea && !isSoon) { 
          base.startTime = startTime || null; 
          base.endTime = endTime || null; 
        }
        if (isSoon) { base.dueDate = dueDate || null; }
        onAdd(base);
        setTitle(""); setDesc(""); setStartTime(""); setEndTime(""); setDueDate(""); setOpen(false);
      };
      const handleKey = (e, field) => {
        if (field === 'title' && e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
      };
      if (!open) {
        return (
          <button onClick={()=>setOpen(true)} className="w-full mt-2 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-black/5 dark:hover:bg-white/5" style={{border:`1px dashed hsl(var(--border))`, color:`hsl(var(--muted-foreground))`}}>
            {isIdea ? "+ Idea" : "+ task"}
          </button>
        );
      }
      return (
        <div className="modal-overlay" onClick={()=>setOpen(false)}>
          <div className="modal-content w-full max-w-sm" onClick={(e)=>e.stopPropagation()}>
            <div className="task-card-today p-4 animate-scale-in space-y-3">
              <h3 className="font-semibold text-sm">{isIdea ? "Add New Idea" : "Add New Task"}</h3>
              <input className="w-full rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-1" style={{background:`hsl(var(--secondary))`}} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>handleKey(e,'title')} placeholder={isIdea ? "Idea title" : "Task title"} autoFocus />
              <textarea ref={textareaRef} className="w-full rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-1 auto-expand-textarea" rows="1" style={{background:`hsl(var(--secondary))`}} value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>{if(e.key==='Enter' && e.shiftKey){}else if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); submit();}}} placeholder="Description" />
              {!isIdea && !isSoon && (
                <div className="flex gap-2 items-center">
                  <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
                  <span className="text-xs">to</span>
                  <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
                </div>
              )}
              {isSoon && (
                <div className="flex gap-2 items-center">
                  <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} className="rounded-lg px-2 py-1 text-sm outline-none" style={{background:`hsl(var(--secondary))`}} />
                </div>
              )}
              <div className="flex gap-2 justify-end">
                <button onClick={()=>setOpen(false)} className="px-3 py-1 rounded-lg text-xs" style={{color:`hsl(var(--muted-foreground))`}}>Cancel</button>
                <button onClick={submit} className="px-3 py-1 rounded-lg text-xs" style={{background:`hsl(var(--primary))`, color:`hsl(var(--primary-foreground))`}}>Add</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Column({ column, title, tasks, onAdd, onUpdate, onDelete, onToggle, showCounter, is24Hour, isIdea = false, isSoon = false, collapsed, onToggleCollapse }) {
      let columnTasks = tasks.filter(t => {
        if (column === 'newIdeas') {
          return t.column === 'newIdeas' || t.column === 'future';
        }
        return t.column === column;
      });
      
      if (column === 'today') {
        columnTasks.sort((a, b) => {
          const aTime = a.startTime ? timeToMin(a.startTime) : Infinity;
          const bTime = b.startTime ? timeToMin(b.startTime) : Infinity;
          return aTime - bTime;
        });
      } else if (column === 'soon') {
        columnTasks.sort((a, b) => {
          const aDate = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
          const bDate = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
          return aDate - bDate;
        });
      } else {
        columnTasks.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
      }
      
      const completedCount = columnTasks.filter(t => t.completed).length;
      const cardType = column === 'today' ? 'today' : (column === 'soon' ? 'soon' : 'ideas');
      return (
        <div className="flex flex-col h-full">
          <div className="flex justify-between items-center mb-2 pb-1 border-b" style={{borderBottomColor:`hsl(var(--border))`}}>
            <div className="flex items-center gap-1">
              <button onClick={onToggleCollapse} className="p-0.5 rounded hover:bg-black/5 dark:hover:bg-white/5">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  {collapsed ? <polyline points="9 18 15 12 9 6"/> : <polyline points="15 18 9 12 15 6"/>}
                </svg>
              </button>
              <h2 className="text-sm font-bold">{title}</h2>
            </div>
            {showCounter && <span className="text-[11px] font-medium px-1.5 py-0.5 rounded-full bg-black/5 dark:bg-white/5">{completedCount}/{columnTasks.length}</span>}
          </div>
          {!collapsed && (
            <>
              <div className="space-y-2 max-h-[70vh] overflow-y-auto pr-1">
                {columnTasks.length === 0 && <div className="text-center py-5 text-xs opacity-40">No {isIdea ? 'ideas' : 'tasks'}</div>}
                {columnTasks.map(task => <TaskCard key={task.id} task={task} onToggle={()=>onToggle(task.id, task.completed)} onDelete={()=>onDelete(task.id)} onUpdate={(updates)=>onUpdate(task.id, updates)} is24Hour={is24Hour} isIdea={isIdea} isSoon={isSoon} columnType={cardType} />)}
              </div>
              <AddTaskForm column={column === 'newIdeas' ? 'newIdeas' : column} onAdd={onAdd} isIdea={isIdea} isSoon={isSoon} />
            </>
          )}
        </div>
      );
    }

    function UndoToasts({ undoStack, onUndo }) {
      const radius = 12;
      const circumference = 2 * Math.PI * radius;
      return (
        <div className="fixed bottom-3 right-3 z-50 flex flex-col gap-2 items-end">
          {undoStack.map(item => {
            const isIdea = item.task.column === 'newIdeas' || item.task.column === 'future';
            const progress = item.remaining / 5;
            const offset = circumference * (1 - progress);
            return (
              <div key={item.task.id} className="undo-toast task-card-today px-3 py-2 flex items-center gap-3 shadow-sm">
                <div>
                  <div className="text-xs font-medium">{item.task.title}</div>
                  <div className="text-[10px] opacity-70">{isIdea ? 'Idea deleted' : 'Task deleted'}</div>
                </div>
                <button onClick={()=>onUndo(item.task)} className="text-xs font-semibold px-1.5 py-0.5 rounded bg-primary/20 hover:bg-primary/30">Undo</button>
                <div className="relative w-7 h-7">
                  <svg className="w-full h-full transform -rotate-90">
                    <circle cx="14" cy="14" r={radius} fill="none" stroke="hsl(var(--muted-foreground)/0.3)" strokeWidth="2.5" />
                    <circle cx="14" cy="14" r={radius} fill="none" stroke="hsl(var(--primary))" strokeWidth="2.5" strokeDasharray={circumference} strokeDashoffset={offset} style={{ transition: 'stroke-dashoffset 0.1s linear' }} />
                  </svg>
                  <span className="absolute inset-0 flex items-center justify-center text-[10px] font-bold">{item.remaining}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function SettingsPanel({ isDark, toggleTheme, is24Hour, toggleFormat, autoReset, toggleAutoReset, focusBgEnabled, toggleFocusBg, user, onLogout, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-start justify-end p-4">
          <div className="absolute inset-0 bg-black/20" onClick={onClose}></div>
          <div className="settings-panel w-64 p-3 relative z-10 animate-scale-in">
            <div className="flex justify-between items-center mb-3">
              <h3 className="text-sm font-semibold">Settings</h3>
              <button onClick={onClose} className="text-lg leading-none">&times;</button>
            </div>
            <div className="flex items-center gap-2 mb-4 pb-2 border-b">
              <img src={user.photoURL || 'https://via.placeholder.com/32'} className="w-8 h-8 rounded-full object-cover" />
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate">{user.displayName || user.email.split('@')[0]}</div>
                <div className="text-xs text-muted-foreground truncate">{user.email}</div>
              </div>
            </div>
            <div className="space-y-3">
              <div className="flex justify-between items-center"><span className="text-xs">Dark mode</span><button onClick={toggleTheme} className={`text-xs px-2 py-0.5 rounded-full min-w-[52px] ${isDark ? 'toggle-on' : 'toggle-off'}`}>{isDark ? "ON" : "OFF"}</button></div>
              <div className="flex justify-between items-center"><span className="text-xs">Time format</span><button onClick={toggleFormat} className={`text-xs px-2 py-0.5 rounded-full min-w-[52px] ${is24Hour ? 'toggle-on' : 'toggle-off'}`}>{is24Hour ? "24h" : "12h"}</button></div>
              <div className="flex justify-between items-center"><span className="text-xs">Auto reset Today</span><button onClick={toggleAutoReset} className={`text-xs px-2 py-0.5 rounded-full min-w-[52px] ${autoReset ? 'toggle-on' : 'toggle-off'}`}>{autoReset ? "ON" : "OFF"}</button></div>
              <div className="flex justify-between items-center"><span className="text-xs">Focus background</span><button onClick={toggleFocusBg} className={`text-xs px-2 py-0.5 rounded-full min-w-[52px] ${focusBgEnabled ? 'toggle-on' : 'toggle-off'}`}>{focusBgEnabled ? "ON" : "OFF"}</button></div>
              <div className="pt-2 border-t"><button onClick={onLogout} className="w-full text-xs py-1.5 rounded bg-red-500/20 text-red-600 dark:text-red-400 hover:bg-red-500/30">Logout</button></div>
            </div>
          </div>
        </div>
      );
    }

    // MAIN APP
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [is24Hour, setIs24Hour] = useState(false);
      const [autoResetToday, setAutoResetToday] = useState(() => localStorage.getItem("autoResetToday") !== "false");
      const [focusBgEnabled, setFocusBgEnabled] = useState(() => {
        const stored = localStorage.getItem("focusBgEnabled");
        return stored === null ? true : stored === "true";
      });
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [collapsed, setCollapsed] = useState({ today: false, soon: false, newIdeas: false });
      const { isDark, toggle: toggleTheme } = useTheme();
      const { tasks, loading, addTask, updateTask, deleteTask, toggleCompleted, undoStack, undoDelete } = useFirestoreTasks(user, autoResetToday);
      const [loadingQuote] = useState(() => timeFacts[Math.floor(Math.random() * timeFacts.length)]);

      useEffect(() => {
        if (focusBgEnabled) {
          initParticleCanvas();
        } else {
          destroyParticleCanvas();
        }
        return () => destroyParticleCanvas();
      }, [focusBgEnabled]);

      useEffect(() => {
        localStorage.setItem("focusBgEnabled", focusBgEnabled);
      }, [focusBgEnabled]);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); });
        return () => unsub();
      }, []);
      useEffect(() => { localStorage.setItem("autoResetToday", autoResetToday); }, [autoResetToday]);

      const login = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const logout = () => auth.signOut();

      if (authLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4" style={{ background: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' }}>
            <canvas id="particle-canvas" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }}></canvas>
            <div className="relative z-10 animate-pulse mb-6">
              <img src="https://i.ibb.co/wZCzhSfW/2task-manager-favicon.png" className="w-16 h-16 rounded-full shadow-lg" />
            </div>
            <div className="relative z-10 loading-quote">{loadingQuote}</div>
            <div className="relative z-10 mt-6 text-xs opacity-70">loading your workspace...</div>
          </div>
        );
      }
      if (!user) {
        setTimeout(() => {
          const canvas = document.getElementById('particle-canvas');
          if (canvas && !particleAnimationId) {
            initParticleCanvas();
          }
        }, 0);
        return (
          <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' }}>
            <canvas id="particle-canvas" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }}></canvas>
            <div className="relative z-10 task-card-today p-6 max-w-md w-full text-center">
              <img src="https://i.ibb.co/wZCzhSfW/2task-manager-favicon.png" className="w-12 h-12 mx-auto mb-3" />
              <h2 className="text-xl font-bold mb-1">Time Management</h2>
              <p className="text-xs opacity-70 mb-5">Organize your day with smart columns & live clock</p>
              <button onClick={login} className="w-full py-2 rounded-lg flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 transition-colors border border-white/30">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5" />
                <span>Continue with Google</span>
              </button>
            </div>
          </div>
        );
      }

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4" style={{ background: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' }}>
            <canvas id="particle-canvas" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }}></canvas>
            <div className="relative z-10 animate-pulse mb-6">
              <img src="https://i.ibb.co/wZCzhSfW/2task-manager-favicon.png" className="w-16 h-16 rounded-full shadow-lg" />
            </div>
            <div className="relative z-10 loading-quote">{loadingQuote}</div>
            <div className="relative z-10 mt-6 text-xs opacity-70">loading your data...</div>
          </div>
        );
      }

      const todayTasks = tasks.filter(t => t.column === 'today');
      
      const columns = [
        { key: 'today', title: 'Must have done Today', isIdea: false, isSoon: false, showCounter: true },
        { key: 'soon', title: 'I will do this soon', isIdea: false, isSoon: true, showCounter: true },
        { key: 'newIdeas', title: 'New Ideas', isIdea: true, isSoon: false, showCounter: false }
      ];

      return (
        <>
          <canvas id="particle-canvas"></canvas>
          <div className="app-content min-h-screen p-4">
            <div className="max-w-7xl mx-auto">
              <div className="flex justify-between items-center mb-4">
                <div></div>
                <div className="flex items-center gap-4">
                  <span className="text-xs font-bold tracking-wider text-muted-foreground">TIME MANAGEMENT</span>
                  <button onClick={()=>setSettingsOpen(true)} className="p-2 rounded-md hover:bg-black/5 transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                      <circle cx="12" cy="12" r="3"/>
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div className="flex flex-col lg:flex-row gap-6">
                <div className="flex-1">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    {columns.map(col => (
                      <Column
                        key={col.key}
                        column={col.key}
                        title={col.title}
                        tasks={tasks}
                        onAdd={addTask}
                        onUpdate={updateTask}
                        onDelete={deleteTask}
                        onToggle={toggleCompleted}
                        showCounter={col.showCounter}
                        is24Hour={is24Hour}
                        isIdea={col.isIdea}
                        isSoon={col.isSoon}
                        collapsed={collapsed[col.key]}
                        onToggleCollapse={() => setCollapsed(prev => ({ ...prev, [col.key]: !prev[col.key] }))}
                      />
                    ))}
                  </div>
                </div>
                
                <div className="lg:w-80 flex-shrink-0 space-y-6">
                  <div className="flex items-center justify-between gap-4">
                    <LargeNumericalClock is24Hour={is24Hour} />
                    <SmallCircleClock tasksToday={todayTasks} is24Hour={is24Hour} />
                  </div>
                  <NextUpAndMissed tasksToday={todayTasks} is24Hour={is24Hour} />
                </div>
              </div>
            </div>
            <UndoToasts undoStack={undoStack} onUndo={undoDelete} />
            {settingsOpen && <SettingsPanel isDark={isDark} toggleTheme={toggleTheme} is24Hour={is24Hour} toggleFormat={()=>setIs24Hour(v=>!v)} autoReset={autoResetToday} toggleAutoReset={()=>setAutoResetToday(v=>!v)} focusBgEnabled={focusBgEnabled} toggleFocusBg={()=>setFocusBgEnabled(v=>!v)} user={user} onLogout={logout} onClose={()=>setSettingsOpen(false)} />}
          </div>
        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
